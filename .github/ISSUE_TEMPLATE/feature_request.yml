name: 功能建议
description: 提交符合当前项目边界的功能建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: 当前只做中文版 MVP。请勿提交英文版、宝宝起名、分享返佣或真实支付接入建议。
  - type: input
    id: stage
    attributes:
      label: 建议所属阶段
      placeholder: 例如 P1 产品设计阶段
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 用户问题
      description: 该建议解决什么用户问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: 边界确认
      options:
        - label: 建议符合当前中文版 MVP 范围
          required: true
        - label: 建议不依赖真实支付或真实 AI
          required: true
        - label: 建议保留古籍出处和风险提醒设计
          required: true

